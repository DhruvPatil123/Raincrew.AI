<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#1E293B" /> <!-- slate-800 -->
    </linearGradient>
    <!-- Brand Primary Gradient (Neon Indigo to Electric Blue) -->
    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" /> <!-- indigo-500 -->
      <stop offset="50%" stop-color="#3B82F6" /> <!-- blue-500 -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- cyan-500 -->
    </linearGradient>
    <!-- Light Glow/Pulse effect -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Base for modern app icon feel -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" stroke="#334155" stroke-width="6" />

  <!-- Voice Wavebars / Equalizer + Follow Up Arrow merged shapes -->
  <g transform="translate(16, 16)" filter="url(#glow)">
    <!-- Equalizer / Voice Audio Waves that form an ascending "Upward" diagonal dynamic trend -->
    <!-- Column 1 (Left) - Small pulse -->
    <rect x="120" y="220" width="28" height="80" rx="14" fill="#38BDF8" opacity="0.6" />
    
    <!-- Column 2 - Medium speech bar -->
    <rect x="170" y="160" width="28" height="180" rx="14" fill="#6366F1" />
    
    <!-- Column 3 - Tall active speaking wave -->
    <rect x="220" y="115" width="28" height="250" rx="14" fill="url(#primaryGrad)" />
    
    <!-- Column 4 - Dynamic high speaking bar -->
    <rect x="270" y="140" width="28" height="200" rx="14" fill="url(#primaryGrad)" />
    
    <!-- Column 5 (Right) - Merging into an upward-pointing arrow head to symbolize "Follow Up" (FoloUp) advancement -->
    <rect x="320" y="190" width="28" height="120" rx="14" fill="#0EA5E9" />
    
    <!-- An elegant glowing dot inside the circle representing the dynamic AI listener -->
    <circle cx="234" cy="240" r="14" fill="#FFFFFF" opacity="0.9" />

    <!-- A sleek, stylized Arrow-Head orbiting upwards for FoloUp feedback loop -->
    <path d="M 310 160 L 375 160 L 375 225" fill="none" stroke="#22D3EE" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 270 265 L 365 170" fill="none" stroke="#22D3EE" stroke-width="24" stroke-linecap="round" />
  </g>
</svg>
