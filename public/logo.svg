<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%">
  <!-- Outer Wrapper Background (Optional, Transparent) -->
  <rect width="1024" height="1024" fill="transparent" />

  <!-- The Interlocking RC Monogram Group -->
  <g transform="translate(10, 10)">
    <!-- Light Blue Wing / Left Column Stem (Cerulean Blue) -->
    <path 
      d="M 210 395 
         C 210 395, 290 350, 290 480 
         L 290 770 
         C 290 770, 390 770, 410 770
         C 320 680, 210 515, 210 395 Z" 
      fill="#0ea5e9" 
    />
    
    <!-- Light Blue Left Corner Foundation block -->
    <path 
      d="M 210 395
         L 210 770
         L 290 770
         L 290 480
         C 290 410, 250 398, 210 395 Z"
      fill="#0ea5e9"
    />

    <!-- Deep Navy R Loop and Curve (Dark Navy) -->
    <path 
      d="M 210 345
         L 510 345
         C 610 345, 690 395, 690 500
         C 690 605, 610 655, 510 655
         L 320 655
         C 340 595, 335 530, 320 480
         L 510 480
         C 535 480, 565 470, 565 495
         C 565 520, 535 520, 510 520
         L 310 520
         C 320 500, 325 450, 290 450
         L 210 450
         Z" 
      fill="#142962" 
    />

    <!-- Deep Navy Bottom Swooping Leg of R (Dark Navy) -->
    <path 
      d="M 320 655
         C 400 655, 450 625, 530 735
         C 570 790, 620 795, 620 795
         C 620 795, 520 790, 460 715
         C 410 655, 360 655, 320 655 Z"
         fill="#142962"
    />

    <!-- Cerulean Blue Sweeping "C" Curve on the right -->
    <path 
      d="M 475 220
         C 650 200, 830 310, 830 500
         C 830 690, 660 795, 470 780
         C 570 820, 770 820, 850 710
         C 930 600, 930 400, 830 290
         C 750 200, 580 190, 475 220 Z" 
      fill="#0ea5e9" 
    />
  </g>
</svg>
